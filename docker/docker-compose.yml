name: anythingllm

networks:
  anything-llm:
    driver: bridge

services:
  anything-llm:
    container_name: anythingllm
    build:
      context: ../.
      dockerfile: ./docker/Dockerfile
      args:
        ARG_UID: ${UID:-1000}
        ARG_GID: ${GID:-1000}
    cap_add:
      - SYS_ADMIN
    volumes:
      - "./.env:/app/server/.env"
      - "../server/storage:/app/server/storage"
      - "../collector/hotdir/:/app/collector/hotdir"
      - "../collector/outputs/:/app/collector/outputs"
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "3001:3001"
    env_file:
      - .env
    networks:
      - anything-llm
    entrypoint: /bin/bash -c "node -e \"const net = require('net'); net.createServer((c) => { const r = net.connect(3000, 'host.docker.internal', () => { c.pipe(r); r.pipe(c); }); c.on('error', (e) => { r.destroy(); }); r.on('error', (e) => { c.destroy(); }); }).listen(3000, '0.0.0.0');\" & exec /usr/local/bin/docker-entrypoint.sh"
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "localhost:host-gateway"
